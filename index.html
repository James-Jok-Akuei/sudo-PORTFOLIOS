<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0C10" />
    <title>.sudo PORTFOLIOS — Permission to present yourself at the highest level.</title>

    <!-- Apply the saved theme before paint to avoid a flash. Dark-first default. -->
    <script>
      (function () {
        var root = document.documentElement;
        try {
          var t = localStorage.getItem("theme") || "dark";
          root.classList.toggle("dark", t === "dark");
          root.classList.toggle("light", t === "light");
          var lang = localStorage.getItem("lang") === "ar" ? "ar" : "en";
          root.lang = lang;
          root.dir = lang === "ar" ? "rtl" : "ltr";
        } catch (e) {
          root.classList.add("dark");
        }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
