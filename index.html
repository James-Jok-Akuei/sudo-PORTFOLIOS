<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0C10" />
    <title>.sudo PORTFOLIOS — Portfolios that get you taken seriously.</title>
    <meta
      name="description"
      content="Clean, fast portfolios for students, professionals, schools, and businesses. Built for South Sudanese at home and in the diaspora, and for everyone, anywhere. Book a free consultation."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://sudo-portfolios.com/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content=".sudo PORTFOLIOS" />
    <meta
      property="og:title"
      content=".sudo PORTFOLIOS — Portfolios that get you taken seriously."
    />
    <meta
      property="og:description"
      content="Clean, fast portfolios for students, professionals, schools, and businesses. Built for South Sudanese at home and in the diaspora, and for everyone. Book a free consultation."
    />
    <meta property="og:url" content="https://sudo-portfolios.com/" />
    <meta property="og:image" content="https://sudo-portfolios.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_AR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content=".sudo PORTFOLIOS — Portfolios that get you taken seriously."
    />
    <meta
      name="twitter:description"
      content="Clean, fast portfolios for students, professionals, schools, and businesses. Built for everyone. Book a free consultation."
    />
    <meta name="twitter:image" content="https://sudo-portfolios.com/og.png" />

    <!-- Apply the saved theme before paint to avoid a flash. Dark-first default. -->
    <script>
      (function () {
        var root = document.documentElement;
        try {
          var t = localStorage.getItem("theme") || "dark";
          root.classList.toggle("dark", t === "dark");
          root.classList.toggle("light", t === "light");
          var lang = localStorage.getItem("lang") === "ar" ? "ar" : "en";
          root.lang = lang;
          root.dir = lang === "ar" ? "rtl" : "ltr";
        } catch (e) {
          root.classList.add("dark");
        }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
